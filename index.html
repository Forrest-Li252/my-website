<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Loading…</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════ */
    :root {
      --bg:        #04080f;
      --bg-2:      #080e1a;
      --bg-3:      #0c1526;
      --surface:   #111c2e;
      --surface-2: #162235;
      --border:    rgba(79, 136, 255, 0.15);
      --border-hi: rgba(79, 136, 255, 0.35);

      --amber:     #f59e0b;
      --amber-dim: rgba(245, 158, 11, 0.15);
      --amber-glow: rgba(245, 158, 11, 0.4);
      --blue:      #3b82f6;
      --blue-dim:  rgba(59, 130, 246, 0.12);
      --cyan:      #06b6d4;
      --red:       #ef4444;

      --text:      #e2e8f2;
      --text-2:    #94a3b8;
      --text-3:    #4a5568;
      --white:     #f8fafc;

      --font-display: 'Barlow Condensed', sans-serif;
      --font-body:    'Barlow', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;

      --radius: 4px;
      --radius-lg: 8px;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 400;
      line-height: 1.6;
      overflow-x: hidden;
      cursor: crosshair;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59, 130, 246, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
      opacity: 0.4;
      animation: scanline 8s linear infinite;
      pointer-events: none;
      z-index: 100;
    }
    @keyframes scanline {
      0%   { top: -2px; opacity: 0; }
      5%   { opacity: 0.4; }
      95%  { opacity: 0.4; }
      100% { top: 100vh; opacity: 0; }
    }

    /* ── Navigation ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 56px;
      background: rgba(4, 8, 15, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: var(--font-mono); font-size: 0.75rem; color: var(--amber); letter-spacing: 0.1em; }
    .nav-logo span { color: var(--text-2); }
    .nav-links { display: flex; gap: 0; list-style: none; }
    .nav-links a {
      font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.08em;
      color: var(--text-2); padding: 0.4rem 1rem;
      border: 1px solid transparent; transition: all 0.2s; text-transform: uppercase;
    }
    .nav-links a:hover { color: var(--amber); border-color: var(--amber-dim); background: var(--amber-dim); }
    .nav-cta { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em; color: var(--amber) !important; border: 1px solid var(--amber) !important; padding: 0.3rem 0.8rem !important; }
    .nav-cta:hover { background: var(--amber) !important; color: var(--bg) !important; }

    /* ── Hero ── */
    .hero {
      position: relative; min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center;
      padding: 7rem 4rem 4rem; overflow: hidden;
    }
    .hero::before, .hero::after { content: ''; position: absolute; width: 60px; height: 60px; opacity: 0.5; }
    .hero::before { top: 80px; left: 2rem; border-top: 2px solid var(--amber); border-left: 2px solid var(--amber); }
    .hero::after { bottom: 2rem; right: 2rem; border-bottom: 2px solid var(--blue); border-right: 2px solid var(--blue); }
    .hero-glow {
      position: absolute; top: 50%; left: 25%;
      transform: translate(-50%, -50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-label {
      font-family: var(--font-mono); font-size: 0.7rem; color: var(--amber);
      letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .hero-label::before { content: ''; display: inline-block; width: 28px; height: 1px; background: var(--amber); }
    .hero-name {
      font-family: var(--font-display); font-weight: 900;
      font-size: clamp(4rem, 10vw, 9rem); line-height: 0.9;
      letter-spacing: -0.02em; color: var(--white);
      text-transform: uppercase; margin-bottom: 1.5rem;
    }
    .hero-name .highlight { color: transparent; -webkit-text-stroke: 2px var(--amber); }
    .hero-tagline {
      font-family: var(--font-display); font-size: clamp(1.1rem, 2.2vw, 1.6rem);
      font-weight: 500; color: var(--text-2); letter-spacing: 0.04em;
      text-transform: uppercase; margin-bottom: 2.5rem; max-width: 600px;
    }
    .hero-tagline .rotating-text { color: var(--cyan); font-weight: 700; display: inline-block; min-width: 240px; }
    .hero-specs {
      display: flex; gap: 0; margin-bottom: 3rem;
      border: 1px solid var(--border); width: fit-content; background: var(--bg-2);
    }
    .spec-item { padding: 0.75rem 1.75rem; border-right: 1px solid var(--border); position: relative; }
    .spec-item:last-child { border-right: none; }
    .spec-value { font-family: var(--font-display); font-size: 2.2rem; font-weight: 800; color: var(--amber); line-height: 1; display: block; }
    .spec-label { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-3); letter-spacing: 0.15em; text-transform: uppercase; display: block; margin-top: 0.2rem; }
    .hero-actions { display: flex; gap: 1rem; align-items: center; }
    .btn-primary {
      font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.75rem 1.75rem;
      background: var(--amber); color: var(--bg); font-weight: 600;
      border: 2px solid var(--amber); cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-primary:hover { background: transparent; color: var(--amber); }
    .btn-secondary {
      font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.75rem 1.75rem;
      border: 1px solid var(--border-hi); color: var(--text-2);
      cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-secondary:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
    .hero-status {
      position: absolute; top: 50%; right: 4rem; transform: translateY(-50%);
      font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-3);
      line-height: 2; letter-spacing: 0.05em;
      border-left: 1px solid var(--border); padding-left: 1rem;
    }
    .hero-status .status-on { color: #22c55e; }
    .hero-status .blink { animation: blink 1.4s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .scroll-indicator {
      position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-3);
    }
    .scroll-arrow { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--border-hi), transparent); position: relative; overflow: hidden; }
    .scroll-arrow::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 10px; background: var(--amber); animation: scroll-flow 1.5s ease-in-out infinite; }
    @keyframes scroll-flow { 0% { top: -10px; } 100% { top: 100%; } }
    .cursor-blink { display: inline-block; width: 2px; height: 1em; background: var(--cyan); margin-left: 2px; vertical-align: middle; animation: blink 0.8s step-end infinite; }

    /* ── Section utility ── */
    section { position: relative; z-index: 1; }
    .section-header { display: flex; align-items: baseline; gap: 1.25rem; margin-bottom: 2.5rem; }
    .section-num { font-family: var(--font-mono); font-size: 0.65rem; color: var(--amber); letter-spacing: 0.1em; }
    .section-title { font-family: var(--font-display); font-size: clamp(1.8rem, 3.5vw, 2.6rem); font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: var(--white); }
    .section-line { flex: 1; height: 1px; background: linear-gradient(to right, var(--border-hi), transparent); }

    /* ── Projects carousel ── */
    .projects-section { padding: 5rem 0 5rem; }
    .projects-header { padding: 0 4rem; }
    .carousel-wrapper { position: relative; }
    .carousel-track {
      display: flex; gap: 1.5rem; padding: 1rem 4rem 2.5rem;
      overflow-x: auto; scroll-snap-type: x mandatory;
      scrollbar-width: thin; scrollbar-color: var(--border-hi) transparent; cursor: grab;
    }
    .carousel-track:active { cursor: grabbing; }
    .carousel-track::-webkit-scrollbar { height: 3px; }
    .carousel-track::-webkit-scrollbar-track { background: transparent; }
    .carousel-track::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
    .project-card {
      flex: 0 0 380px; scroll-snap-align: start;
      background: var(--bg-2); border: 1px solid var(--border);
      position: relative; overflow: hidden;
      transition: border-color 0.3s, transform 0.3s var(--ease-out);
      display: flex; flex-direction: column;
    }
    .project-card:hover { border-color: var(--border-hi); transform: translateY(-4px); }
    .project-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--card-accent, var(--amber));
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.4s var(--ease-out);
    }
    .project-card:hover::before { transform: scaleX(1); }
    .card-img { width: 100%; height: 200px; background: var(--surface); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .card-img-pattern { position: absolute; inset: 0; background-image: linear-gradient(45deg, rgba(255,255,255,0.02) 25%, transparent 25%), linear-gradient(-45deg, rgba(255,255,255,0.02) 25%, transparent 25%); background-size: 10px 10px; }
    .card-img-label { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.15em; color: var(--text-3); text-transform: uppercase; z-index: 1; }
    .card-img-icon { font-size: 2.5rem; z-index: 1; margin-bottom: 0.5rem; }
    .card-img-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, var(--bg-2)); }
    .card-body { padding: 1.25rem 1.5rem 1.5rem; display: flex; flex-direction: column; flex: 1; }
    .card-meta { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.12em; color: var(--text-3); text-transform: uppercase; margin-bottom: 0.5rem; }
    .card-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; color: var(--white); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 0.6rem; line-height: 1.15; }
    .card-desc { font-size: 0.85rem; color: var(--text-2); line-height: 1.6; margin-bottom: 1.25rem; flex: 1; }
    .card-metric { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.75rem; background: var(--amber-dim); border-left: 2px solid var(--amber); margin-bottom: 1.25rem; }
    .metric-value { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; color: var(--amber); line-height: 1; white-space: nowrap; }
    .metric-label { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-2); letter-spacing: 0.08em; text-transform: uppercase; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 1rem; border-top: 1px solid var(--border); }
    .card-tags { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .tag { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.2rem 0.5rem; background: var(--bg-3); border: 1px solid var(--border); color: var(--text-3); }
    .tag-blue { border-color: rgba(59,130,246,0.3); color: var(--blue); background: rgba(59,130,246,0.08); }
    .tag-amber { border-color: rgba(245,158,11,0.3); color: var(--amber); background: rgba(245,158,11,0.08); }
    .tag-cyan { border-color: rgba(6,182,212,0.3); color: var(--cyan); background: rgba(6,182,212,0.08); }
    .tag-red { border-color: rgba(239,68,68,0.3); color: var(--red); background: rgba(239,68,68,0.08); }
    .card-link { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.08em; color: var(--text-2); display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.35rem 0.75rem; border: 1px solid var(--border); transition: all 0.2s; white-space: nowrap; }
    .card-link:hover { color: var(--amber); border-color: var(--amber); background: var(--amber-dim); }
    .card-link .arrow { transition: transform 0.2s; }
    .card-link:hover .arrow { transform: translateX(3px); }
    .carousel-controls { display: flex; align-items: center; gap: 1rem; padding: 0 4rem; margin-top: 0.5rem; }
    .carousel-btn { width: 36px; height: 36px; border: 1px solid var(--border-hi); background: transparent; color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: all 0.2s; }
    .carousel-btn:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
    .carousel-hint { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.1em; color: var(--text-3); text-transform: uppercase; }
    .project-filters { display: flex; gap: 0; margin-bottom: 2rem; border: 1px solid var(--border); width: fit-content; }
    .filter-btn { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.55rem 1.2rem; border: none; border-right: 1px solid var(--border); background: transparent; color: var(--text-3); cursor: pointer; transition: all 0.2s; }
    .filter-btn:last-child { border-right: none; }
    .filter-btn:hover { color: var(--text-2); background: var(--surface); }
    .filter-btn.active { background: var(--amber-dim); color: var(--amber); border-color: var(--amber-dim); }

    /* ── Research ── */
    .research-section { padding: 5rem 4rem; border-top: 1px solid var(--border); }
    .research-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 1.5rem; margin-top: 0.5rem; }
    .research-card { background: var(--bg-2); border: 1px solid var(--border); position: relative; overflow: hidden; transition: border-color 0.3s, transform 0.3s var(--ease-out); }
    .research-card:hover { border-color: var(--border-hi); transform: translateY(-3px); }
    .research-card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .research-card-inner { padding: 1.75rem 2rem 2rem; }
    .research-org { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-3); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .research-org::before { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--cyan); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
    .research-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; color: var(--white); margin-bottom: 0.75rem; line-height: 1.2; }
    .research-desc { font-size: 0.9rem; color: var(--text-2); line-height: 1.65; margin-bottom: 1.5rem; }
    .research-stats { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; padding: 0.75rem 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .r-stat-value { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; color: var(--cyan); display: block; }
    .r-stat-label { font-family: var(--font-mono); font-size: 0.58rem; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; }
    .research-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
    .research-link { display: inline-flex; align-items: center; gap: 0.5rem; font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cyan); border: 1px solid rgba(6,182,212,0.4); padding: 0.5rem 1.25rem; transition: all 0.2s; }
    .research-link:hover { background: rgba(6,182,212,0.1); border-color: var(--cyan); }
    .research-link .arrow { transition: transform 0.2s; }
    .research-link:hover .arrow { transform: translateX(3px); }

    /* ── About + Skills ── */
    .about-section { padding: 5rem 4rem; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; }
    .about-bio { font-size: 1.05rem; color: var(--text-2); line-height: 1.8; margin-bottom: 1.5rem; }
    .about-bio strong { color: var(--white); font-weight: 600; }
    .education-block { margin-top: 2rem; padding: 1.25rem 1.5rem; background: var(--bg-2); border: 1px solid var(--border); border-left: 3px solid var(--amber); }
    .edu-school { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; text-transform: uppercase; color: var(--white); }
    .edu-detail { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-2); margin-top: 0.25rem; letter-spacing: 0.05em; }
    .skill-bubbles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    .skill-bucket { position: relative; background: var(--bg-2); border: 1px solid var(--border); padding: 1.1rem 1.25rem 1rem; cursor: default; overflow: hidden; transition: border-color 0.25s, background 0.25s; }
    .skill-bucket::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--bucket-color, var(--amber)); transform: scaleX(0); transform-origin: left; transition: transform 0.35s var(--ease-out); }
    .skill-bucket:hover { border-color: var(--border-hi); background: var(--surface); }
    .skill-bucket:hover::after { transform: scaleX(1); }
    .bucket-label { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--white); display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.75rem; transition: color 0.2s; }
    .bucket-label .bucket-icon { font-size: 1rem; }
    .bucket-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; max-height: 0; overflow: hidden; opacity: 0; transform: translateY(-4px); transition: max-height 0.4s var(--ease-out), opacity 0.3s ease, transform 0.3s ease; }
    .skill-bucket:hover .bucket-chips { max-height: 120px; opacity: 1; transform: translateY(0); }
    .chip { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.22rem 0.55rem; border: 1px solid var(--bucket-color, var(--border)); color: var(--bucket-color, var(--text-2)); background: color-mix(in srgb, var(--bucket-color, var(--text-2)) 8%, transparent); white-space: nowrap; opacity: 0; transform: scale(0.9); transition: opacity 0.2s ease, transform 0.2s ease; }
    .skill-bucket:hover .chip { opacity: 1; transform: scale(1); }
    .skill-bucket:hover .chip:nth-child(1) { transition-delay: 0.05s; }
    .skill-bucket:hover .chip:nth-child(2) { transition-delay: 0.1s; }
    .skill-bucket:hover .chip:nth-child(3) { transition-delay: 0.15s; }
    .skill-bucket:hover .chip:nth-child(4) { transition-delay: 0.2s; }
    .skill-bucket:hover .chip:nth-child(5) { transition-delay: 0.25s; }
    .skill-bucket:hover .chip:nth-child(6) { transition-delay: 0.3s; }
    .bucket-hint { font-family: var(--font-mono); font-size: 0.58rem; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; transition: opacity 0.2s; }
    .skill-bucket:hover .bucket-hint { opacity: 0; }

    /* ── Experience ── */
    .experience-section { padding: 5rem 4rem; border-top: 1px solid var(--border); }
    .timeline { position: relative; padding-left: 3rem; }
    .timeline::before { content: ''; position: absolute; left: 0; top: 0.5rem; bottom: 0; width: 1px; background: linear-gradient(to bottom, var(--amber), var(--blue), transparent); }
    .timeline-item { position: relative; margin-bottom: 2.5rem; }
    .timeline-dot { position: absolute; left: -3.3rem; top: 0.45rem; width: 10px; height: 10px; border: 2px solid var(--amber); background: var(--bg); transform: rotate(45deg); }
    .timeline-date { font-family: var(--font-mono); font-size: 0.65rem; color: var(--amber); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.35rem; }
    .timeline-role { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; text-transform: uppercase; color: var(--white); letter-spacing: 0.04em; }
    .timeline-org { font-size: 0.85rem; color: var(--text-2); margin-top: 0.15rem; margin-bottom: 0.5rem; }
    .timeline-desc { font-size: 0.875rem; color: var(--text-2); line-height: 1.65; }

    /* ── Contact ── */

        <div class="card-img-pattern"></div>
        <div style="display:flex;flex-direction:column;align-items:center;z-index:1;">
          <div class="card-img-icon">${p.icon}</div>
          <span class="card-img-label">${p.imgLabel}</span>
        </div>
        <div class="card-img-overlay"></div>
      </div>
      <div class="card-body">
        <div class="card-meta">${p.meta}</div>
        <h3 class="card-title">${p.title}</h3>
        <p class="card-desc">${p.desc}</p>
        <div class="card-metric">
          <span class="metric-value">${p.metric.value}</span>
          <span class="metric-label">${p.metric.label}</span>
        </div>
        <div class="card-footer">
          <div class="card-tags">${p.tags.map(tagHTML).join('')}</div>
          <a href="${p.link.href}" class="card-link">${p.link.label} <span class="arrow">→</span></a>
        </div>
      </div>
    </div>`;
  }).join('');

  // Project filter logic
  document.getElementById('project-filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;
    document.querySelectorAll('.project-card').forEach(card => {
      const show = filter === 'all' || card.dataset.category === filter;
      card.style.transition = 'opacity 0.3s, transform 0.3s';
      if (show) {
        card.style.display = 'flex';
        requestAnimationFrame(() => { card.style.opacity = '1'; card.style.transform = ''; });
      } else {
        card.style.opacity = '0'; card.style.transform = 'scale(0.95)';
        setTimeout(() => { card.style.display = 'none'; }, 300);
      }
    });
  });

  // Carousel drag
  const track = document.getElementById('carousel');
  let isDown = false, startX, scrollLeft;
  track.addEventListener('mousedown', e => { isDown = true; track.style.cursor = 'grabbing'; startX = e.pageX - track.offsetLeft; scrollLeft = track.scrollLeft; });
  track.addEventListener('mouseleave', () => { isDown = false; track.style.cursor = 'grab'; });
  track.addEventListener('mouseup', () => { isDown = false; track.style.cursor = 'grab'; });
  track.addEventListener('mousemove', e => { if (!isDown) return; e.preventDefault(); const x = e.pageX - track.offsetLeft; track.scrollLeft = scrollLeft - (x - startX) * 1.5; });
  function scrollCarousel(dir) { track.scrollBy({ left: dir * (380 + 24), behavior: 'smooth' }); }

  // ── Research ──
  document.getElementById('research-grid').innerHTML = D.research.map((r, i) => {
    const delay = i > 0 ? ` reveal-delay-${i}` : '';
    return `
    <div class="research-card reveal${delay}">
      <div class="research-card-accent" style="background:${r.accentGradient};"></div>
      <div class="research-card-inner">
        <div class="research-org">${r.org}</div>
        <h3 class="research-title">${r.title}</h3>
        <p class="research-desc">${r.desc}</p>
        <div class="research-stats">
          ${r.stats.map(s => `<div><span class="r-stat-value">${s.value}</span><span class="r-stat-label">${s.label}</span></div>`).join('')}
        </div>
        <div class="research-tags">${r.tags.map(tagHTML).join('')}</div>
        <a href="${r.link.href}" class="research-link">${r.link.label} <span class="arrow">→</span></a>
      </div>
    </div>`;
  }).join('');

  // ── About ──
  document.getElementById('about-bio').innerHTML =
    D.about.bio.map((p, i) =>
      `<p class="about-bio reveal${i > 0 ? ' reveal-delay-' + i : ''}">${parseBold(p)}</p>`
    ).join('');
  const edu = D.about.education;
  document.getElementById('education-block').innerHTML =
    `<div class="edu-school">${edu.school}</div>
     <div class="edu-detail">${edu.degree}</div>
     <div class="edu-detail" style="margin-top:0.5rem;">${edu.detail}</div>`;

  // ── Skills ──
  document.getElementById('skill-bubbles').innerHTML = D.skills.map(s => `
    <div class="skill-bucket" style="--bucket-color:${s.color};${s.wide ? 'grid-column:span 2;' : ''}">
      <div class="bucket-label"><span class="bucket-icon">${s.icon}</span> ${s.label}</div>
      <div class="bucket-hint">Hover to expand</div>
      <div class="bucket-chips">
        ${s.chips.map(c => `<span class="chip">${c}</span>`).join('')}
      </div>
    </div>`
  ).join('');

  // ── Experience ──
  document.getElementById('timeline').innerHTML = D.experience.map((e, i) => {
    const delay = i > 0 ? ` reveal-delay-${i}` : '';
    return `
    <div class="timeline-item reveal${delay}">
      <div class="timeline-dot"></div>
      <div class="timeline-date">${e.date}</div>
      <div class="timeline-role">${e.role}</div>
      <div class="timeline-org">${e.org}</div>
      <p class="timeline-desc">${e.desc}</p>
    </div>`;
  }).join('');

  // ── Contact ──
  const hl = D.contact.headline;
  document.getElementById('contact-headline').innerHTML =
    `<span>${hl[0]}</span><br><span class="outline">${hl[1]}</span><br><span>${hl[2]}</span>`;
  document.getElementById('contact-sub').textContent = D.contact.sub;
  document.getElementById('contact-links').innerHTML = D.contact.links.map(l => `
    <a href="${l.href}"${l.newTab ? ' target="_blank"' : ''} class="contact-link-item">
      <div class="contact-link-icon">${l.icon}</div>
      <div>
        <span class="contact-link-label">${l.label}</span>
        <span class="contact-link-value">${l.value}</span>
      </div>
      <span class="contact-link-arrow">→</span>
    </a>`
  ).join('');

  // ── Footer ──
  document.getElementById('footer-name').textContent    = D.footer.name;
  document.getElementById('footer-tagline').textContent = D.footer.tagline;

  // ── Hero timestamp ──
  const now = new Date();
  const stamp = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  document.getElementById('hero-status').querySelector('.blink').parentElement.innerHTML =
    `LAST_UPDATED ${stamp} <span class="blink">_</span>`;

  // ── Scroll reveal ──
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  </script>
</body>
</html>
